network:
  version: 2
  wifis:
    INTF:
      dhcp4: false
      dhcp6: true
      optional: true
      addresses:
        - ADDR4
      nameservers:
        addresses: [DNS4]
      routes:
        - to: default
          via: GATE4
      access-points:
        "WWIIFFII":
          auth:
            key-management: "KKYY"
            password: "PPAASS"

