# .gitlab-ci.yml — Qube Enterprise Service CI/CD
#
# This file goes in EACH GitLab repo (cloud, conf-agent, influx-to-sql, mqtt-gateway).
# Builds Docker image and pushes to GitLab Container Registry.
#
# Repo structure in GitLab:
#   iot-team4/product/enterprise-cloud-api     → builds cloud-api:amd64.latest
#   iot-team4/product/enterprise-conf-agent    → builds enterprise-conf-agent:arm64.latest
#   iot-team4/product/enterprise-influx-to-sql → builds enterprise-influx-to-sql:arm64.latest
#   iot-team4/product/mqtt-gateway             → builds mqtt-gateway:arm64.latest
#
# Existing repos (unchanged — not our code):
#   iot-team4/product/modbus-gateway
#   iot-team4/product/opc-ua-gateway
#   iot-team4/product/snmp-gateway

stages:
  - test
  - build
  - deploy

variables:
  # Set per-repo in GitLab CI/CD Settings → Variables:
  #   PLATFORM:    linux/amd64   (for cloud-api)
  #                linux/arm64   (for edge services)
  #   CLOUD_VM_HOST, CLOUD_VM_USER, CLOUD_VM_SSH_KEY (for deploy job)
  DOCKER_BUILDKIT: "1"
  IMAGE_NAME: $CI_REGISTRY_IMAGE
  # e.g. registry.gitlab.com/iot-team4/product/enterprise-conf-agent

# ── Test — only for cloud-api ──────────────────────────────────────────────────
test-api:
  stage: test
  image: golang:1.22-alpine
  only:
    - merge_requests
    - main
  # Only run for cloud-api repo
  rules:
    - if: '$CI_PROJECT_NAME == "enterprise-cloud-api"'
  services:
    - name: postgres:15
      alias: postgres
      variables:
        POSTGRES_DB:       qubedb
        POSTGRES_USER:     qubeadmin
        POSTGRES_PASSWORD: qubepass
  variables:
    POSTGRES_DB:       qubedb
    POSTGRES_USER:     qubeadmin
    POSTGRES_PASSWORD: qubepass
  before_script:
    - apk add --no-cache postgresql-client
    - for f in migrations/*.sql; do PGPASSWORD=qubepass psql -h postgres -U qubeadmin -d qubedb -f "$f"; done
    - cd cloud && go mod tidy
  script:
    - CGO_ENABLED=0 go build -o /tmp/cloud-api ./cmd/server
    - DATABASE_URL="postgres://qubeadmin:qubepass@postgres:5432/qubedb?sslmode=disable"
      JWT_SECRET="ci-test" API_PORT=8080 TP_PORT=8081
      /tmp/cloud-api &
    - sleep 5
    - curl -sf http://localhost:8080/health
    - chmod +x test/test_api.sh && ./test/test_api.sh

# ── Build — all repos ──────────────────────────────────────────────────────────
build-image:
  stage: build
  image: docker:26
  services:
    - docker:26-dind
  only:
    - main
    - tags
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    # Set up QEMU for arm64 cross-compilation (skip for amd64/cloud-api)
    - |
      if [ "${PLATFORM:-linux/arm64}" = "linux/arm64" ]; then
        docker run --rm --privileged multiarch/qemu-user-static --reset -p yes
      fi
    - docker buildx create --use --name builder || true
  script:
    - |
      TAG="${CI_COMMIT_TAG:-latest}"
      PLATFORM="${PLATFORM:-linux/arm64}"

      docker buildx build \
        --platform "$PLATFORM" \
        --tag "$IMAGE_NAME:${PLATFORM##*/}.${TAG}" \
        --tag "$IMAGE_NAME:${PLATFORM##*/}.latest" \
        --push \
        .

      echo "Pushed: $IMAGE_NAME:${PLATFORM##*/}.${TAG}"
      echo "Pushed: $IMAGE_NAME:${PLATFORM##*/}.latest"

# ── Deploy cloud-api to cloud VM ──────────────────────────────────────────────
deploy-cloud:
  stage: deploy
  image: alpine:latest
  only:
    - main
  rules:
    - if: '$CI_PROJECT_NAME == "enterprise-cloud-api"'
  before_script:
    - apk add --no-cache openssh-client curl
    - eval $(ssh-agent -s)
    - echo "$CLOUD_VM_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -H "$CLOUD_VM_HOST" >> ~/.ssh/known_hosts
  script:
    - |
      ssh "$CLOUD_VM_USER@$CLOUD_VM_HOST" "
        docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
        cd /opt/qube-enterprise
        export CLOUD_API_IMAGE='$IMAGE_NAME:amd64.latest'
        docker compose pull cloud-api
        docker compose up -d cloud-api
        sleep 5
        curl -sf http://localhost:8080/health && echo 'Deploy OK'
      "
  environment:
    name: production
    url: http://$CLOUD_VM_HOST:8080
