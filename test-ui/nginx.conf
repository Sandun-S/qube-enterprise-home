server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Never cache JS/CSS — always serve fresh after a deployment
    location ~* \.(js|css)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires -1;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
