name: Build and Push — Qube Enterprise

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# github.repository = "Sandun-S/qube-enterprise-home"
# We lowercase it for Docker tags using ${{ env.REPO }}
env:
  REGISTRY: ghcr.io

jobs:
  # ── Cloud API — amd64 (runs on cloud server) ────────────────────────────────
  cloud-api:
    name: cloud-api (amd64)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase repo name
        run: echo "REPO=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      # Single repo — image name includes the service: ghcr.io/sandun-s/qube-enterprise-home/cloud-api
      - uses: docker/build-push-action@v5
        with:
          context:   ./cloud
          platforms: linux/amd64
          push:      ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ env.REPO }}/cloud-api:amd64.latest
            ghcr.io/${{ env.REPO }}/cloud-api:amd64.${{ github.sha }}
          cache-from: type=gha,scope=cloud-api
          cache-to:   type=gha,mode=max,scope=cloud-api

  # ── ARM64 images — run on Qube devices ──────────────────────────────────────
  arm64-images:
    name: ${{ matrix.name }} (arm64)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: conf-agent
            context: ./conf-agent
          - name: influx-to-sql
            context: ./enterprise-influx-to-sql
          - name: mqtt-gateway
            context: ./mqtt-gateway
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase repo name
        run: echo "REPO=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: docker/setup-buildx-action@v3

      # Images: ghcr.io/sandun-s/qube-enterprise-home/conf-agent:arm64.latest
      - uses: docker/build-push-action@v5
        with:
          context:   ${{ matrix.context }}
          platforms: linux/arm64
          push:      ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ env.REPO }}/${{ matrix.name }}:arm64.latest
            ghcr.io/${{ env.REPO }}/${{ matrix.name }}:arm64.${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to:   type=gha,mode=max,scope=${{ matrix.name }}

  # ── API test suite ────────────────────────────────────────────────────────────
  test:
    name: API tests
    runs-on: ubuntu-latest
    needs: [cloud-api]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB:       qubedb
          POSTGRES_USER:     qubeadmin
          POSTGRES_PASSWORD: qubepass
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: cloud/go.sum

      - name: Run migrations
        run: |
          sudo apt-get install -y postgresql-client -qq
          for f in cloud/migrations/*.sql; do
            PGPASSWORD=qubepass psql -h localhost -U qubeadmin -d qubedb -f "$f"
          done

      - name: Build cloud-api
        run: cd cloud && go mod tidy && CGO_ENABLED=0 go build -o /tmp/cloud-api ./cmd/server

      - name: Start cloud-api
        run: |
          DATABASE_URL="postgres://qubeadmin:qubepass@localhost:5432/qubedb?sslmode=disable" \
          JWT_SECRET="ci-test-secret" API_PORT=8080 TP_PORT=8081 \
          /tmp/cloud-api &
          sleep 5
          curl -sf http://localhost:8080/health

      - name: Run full API test suite
        run: chmod +x test/test_api.sh && ./test/test_api.sh

  # ── Deploy to Azure VM ───────────────────────────────────────────────────────
  deploy:
    name: Deploy to cloud VM
    runs-on: ubuntu-latest
    needs: [cloud-api, test]
    # if: github.ref == 'refs/heads/main'
    if: false  # enable when CLOUD_VM_HOST is set
    steps:
      - name: Lowercase repo name
        run: echo "REPO=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.CLOUD_VM_HOST }}
          username: ${{ secrets.CLOUD_VM_USER }}
          key:      ${{ secrets.CLOUD_VM_SSH_KEY }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin
            cd /opt/qube-enterprise
            # Update image tag in compose to use this repo's image
            export CLOUD_IMAGE="ghcr.io/${{ env.REPO }}/cloud-api:amd64.latest"
            sed -i "s|image: .*cloud-api.*|image: ${CLOUD_IMAGE}|" docker-compose.yml
            docker compose pull cloud-api
            docker compose up -d cloud-api
            sleep 5
            curl -sf http://localhost:8080/health && echo "Deploy OK"
