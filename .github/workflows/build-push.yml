name: Build and Push — Qube Enterprise v2

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  # ── Cloud API — amd64 (runs on cloud VM) ──────────────────────────────────
  cloud-api:
    name: cloud-api (amd64)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase repo name
        run: echo "REPO=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context:   ./cloud
          platforms: linux/amd64
          push:      ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ env.REPO }}/cloud-api:amd64.latest
            ghcr.io/${{ env.REPO }}/cloud-api:amd64.${{ github.sha }}
          cache-from: type=gha,scope=cloud-api
          cache-to:   type=gha,mode=max,scope=cloud-api

  # ── ARM64 — self-contained services (no shared pkg/) ──────────────────────
  # Build context is the service directory itself.
  arm64-standalone:
    name: ${{ matrix.name }} (arm64)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: conf-agent
            context: ./conf-agent
          - name: enterprise-influx-to-sql
            context: ./enterprise-influx-to-sql
          - name: mqtt-gateway
            context: ./mqtt-gateway
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase repo name
        run: echo "REPO=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context:   ${{ matrix.context }}
          platforms: linux/arm64
          push:      ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ env.REPO }}/${{ matrix.name }}:arm64.latest
            ghcr.io/${{ env.REPO }}/${{ matrix.name }}:arm64.${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to:   type=gha,mode=max,scope=${{ matrix.name }}

  # ── ARM64 reader images — require shared pkg/ ────────────────────────────
  # Build context = repo root so "COPY pkg /pkg" in each Dockerfile resolves
  # to the shared pkg/ module. Dockerfile path points into the service subdir.
  arm64-readers:
    name: ${{ matrix.name }} (arm64)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: modbus-reader
            dockerfile: ./modbus-reader/Dockerfile
          - name: snmp-reader
            dockerfile: ./snmp-reader/Dockerfile
          - name: opcua-reader
            dockerfile: ./opcua-reader/Dockerfile
          - name: http-reader
            dockerfile: ./http-reader/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase repo name
        run: echo "REPO=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: docker/setup-buildx-action@v3

      # context: . = repo root — COPY pkg /pkg in Dockerfiles finds pkg/ correctly
      # Each reader's Dockerfile does: COPY pkg /pkg + COPY <service-dir>/ + go build
      - uses: docker/build-push-action@v5
        with:
          context:    .
          file:       ${{ matrix.dockerfile }}
          platforms:  linux/arm64
          push:       ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ env.REPO }}/${{ matrix.name }}:arm64.latest
            ghcr.io/${{ env.REPO }}/${{ matrix.name }}:arm64.${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to:   type=gha,mode=max,scope=${{ matrix.name }}

  # ── API test suite ──────────────────────────────────────────────────────────
  test:
    name: API tests
    runs-on: ubuntu-latest
    needs: [cloud-api]
    services:
      postgres:
        # TimescaleDB — same image used in docker-compose.dev.yml
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_DB:       qubedb
          POSTGRES_USER:     qubeadmin
          POSTGRES_PASSWORD: qubepass
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: cloud/go.sum

      - name: Run management DB migrations (qubedb)
        run: |
          sudo apt-get install -y postgresql-client -qq
          for f in cloud/migrations/001_init.sql \
                   cloud/migrations/002_global_data.sql \
                   cloud/migrations/003_test_seeds.sql; do
            PGPASSWORD=qubepass psql -h localhost -U qubeadmin -d qubedb -f "$f"
          done

      - name: Create telemetry DB (qubedata)
        run: |
          # Create qubedata database
          PGPASSWORD=qubepass psql -h localhost -U qubeadmin -d postgres \
            -c "CREATE DATABASE qubedata;" 2>/dev/null || true
          # Enable TimescaleDB (may fail if TS not available in CI image, graceful)
          PGPASSWORD=qubepass psql -h localhost -U qubeadmin -d qubedata \
            -c "CREATE EXTENSION IF NOT EXISTS timescaledb;" 2>/dev/null || true
          # Run telemetry schema (sensor_readings table + hypertable)
          # The migration file uses \c qubedata which is a no-op when already connected
          PGPASSWORD=qubepass psql -h localhost -U qubeadmin -d qubedata \
            -f cloud/migrations-telemetry/001_timescale_init.sql 2>/dev/null || true

      - name: Build cloud-api
        run: cd cloud && go mod tidy && CGO_ENABLED=0 go build -o /tmp/cloud-api ./cmd/server

      - name: Start cloud-api
        run: |
          DATABASE_URL="postgres://qubeadmin:qubepass@localhost:5432/qubedb?sslmode=disable" \
          TELEMETRY_DATABASE_URL="postgres://qubeadmin:qubepass@localhost:5432/qubedata?sslmode=disable" \
          JWT_SECRET="dev-jwt-secret-change-in-production" \
          /tmp/cloud-api &
          sleep 5
          curl -sf http://localhost:8080/health
          curl -sf http://localhost:8081/health

      - name: Run full API test suite
        run: chmod +x test/test_api.sh && ./test/test_api.sh

  # ── Deploy to cloud VM (opt-in) ─────────────────────────────────────────────
  # Enable by setting Actions variable ENABLE_DEPLOY=true and secrets:
  #   CLOUD_VM_HOST, CLOUD_VM_USER, CLOUD_VM_SSH_KEY
  deploy:
    name: Deploy to cloud VM
    runs-on: ubuntu-latest
    needs: [cloud-api, test]
    if: ${{ github.ref == 'refs/heads/main' && vars.ENABLE_DEPLOY == 'true' }}
    steps:
      - name: Lowercase repo name
        run: echo "REPO=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.CLOUD_VM_HOST }}
          username: ${{ secrets.CLOUD_VM_USER }}
          key:      ${{ secrets.CLOUD_VM_SSH_KEY }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin
            cd /opt/qube-enterprise
            docker compose pull cloud-api
            docker compose up -d cloud-api
            sleep 5
            curl -sf http://localhost:8080/health && echo "Deploy OK"
