name: Build and Push — Qube Enterprise v2

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  # ── Cloud API — amd64 (runs on cloud VM) ──────────────────────────────────
  cloud-api:
    name: cloud-api (amd64)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase repo name
        run: echo "REPO=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context:   ./cloud
          platforms: linux/amd64
          push:      ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ env.REPO }}/cloud-api:amd64.latest
            ghcr.io/${{ env.REPO }}/cloud-api:amd64.${{ github.sha }}
          cache-from: type=gha,scope=cloud-api
          cache-to:   type=gha,mode=max,scope=cloud-api

  # ── conf-agent — amd64 (Multipass/x86 dev) + arm64 (real Qube) ────────────
  conf-agent:
    name: conf-agent (amd64 + arm64)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase repo name
        run: echo "REPO=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context:   ./conf-agent
          platforms: linux/amd64,linux/arm64
          push:      ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ env.REPO }}/conf-agent:amd64.latest
            ghcr.io/${{ env.REPO }}/conf-agent:arm64.latest
            ghcr.io/${{ env.REPO }}/conf-agent:amd64.${{ github.sha }}
            ghcr.io/${{ env.REPO }}/conf-agent:arm64.${{ github.sha }}
          cache-from: type=gha,scope=conf-agent
          cache-to:   type=gha,mode=max,scope=conf-agent

  # ── Reader services + influx-to-sql + core-switch — amd64 + arm64 ──────────
  # amd64 = Multipass/x86 dev VMs, arm64 = real Qube (Raspberry Pi / Kadas)
  readers:
    name: ${{ matrix.name }} (amd64+arm64)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: enterprise-influx-to-sql
            context: ./enterprise-influx-to-sql
          - name: influxdb-relay
            context: ./influxdb-relay
          - name: core-switch
            context: ./core-switch
          - name: mqtt-reader
            context: ./mqtt-reader
          - name: snmp-reader
            context: ./snmp-reader
          - name: modbus-reader
            context: ./modbus-reader
          - name: opcua-reader
            context: ./opcua-reader
          - name: http-reader
            context: ./http-reader
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase repo name
        run: echo "REPO=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context:   ${{ matrix.context }}
          platforms: linux/amd64,linux/arm64
          push:      ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ env.REPO }}/${{ matrix.name }}:amd64.latest
            ghcr.io/${{ env.REPO }}/${{ matrix.name }}:arm64.latest
            ghcr.io/${{ env.REPO }}/${{ matrix.name }}:amd64.${{ github.sha }}
            ghcr.io/${{ env.REPO }}/${{ matrix.name }}:arm64.${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to:   type=gha,mode=max,scope=${{ matrix.name }}

  # ── Test UI — amd64 (served by nginx on cloud VM) ──────────────────────────
  test-ui:
    name: test-ui (amd64)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase repo name
        run: echo "REPO=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context:   ./test-ui
          platforms: linux/amd64
          push:      ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ env.REPO }}/test-ui:amd64.latest
          cache-from: type=gha,scope=test-ui
          cache-to:   type=gha,mode=max,scope=test-ui

  # ── API test suite ──────────────────────────────────────────────────────────
  test:
    name: API tests
    runs-on: ubuntu-latest
    needs: [cloud-api]
    services:
      postgres:
        # TimescaleDB — same image used in docker-compose.dev.yml
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_DB:       qubedb
          POSTGRES_USER:     qubeadmin
          POSTGRES_PASSWORD: qubepass
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: cloud/go.sum

      - name: Run management DB migrations (qubedb)
        run: |
          sudo apt-get install -y postgresql-client -qq
          for f in $(ls cloud/migrations/0*.sql | sort); do
            echo "Applying $f..."
            PGPASSWORD=qubepass psql -h localhost -U qubeadmin -d qubedb -f "$f"
          done

      - name: Create telemetry DB (qubedata)
        run: |
          # Create qubedata database
          PGPASSWORD=qubepass psql -h localhost -U qubeadmin -d postgres \
            -c "CREATE DATABASE qubedata;" 2>/dev/null || true
          # Enable TimescaleDB (may fail if TS not available in CI image, graceful)
          PGPASSWORD=qubepass psql -h localhost -U qubeadmin -d qubedata \
            -c "CREATE EXTENSION IF NOT EXISTS timescaledb;" 2>/dev/null || true
          # Run telemetry schema (sensor_readings table + hypertable)
          # The migration file uses \c qubedata which is a no-op when already connected
          PGPASSWORD=qubepass psql -h localhost -U qubeadmin -d qubedata \
            -f cloud/migrations-telemetry/001_timescale_init.sql 2>/dev/null || true

      - name: Build cloud-api
        run: cd cloud && go mod tidy && CGO_ENABLED=0 go build -o /tmp/cloud-api ./cmd/server

      - name: Start cloud-api
        run: |
          DATABASE_URL="postgres://qubeadmin:qubepass@localhost:5432/qubedb?sslmode=disable" \
          TELEMETRY_DATABASE_URL="postgres://qubeadmin:qubepass@localhost:5432/qubedata?sslmode=disable" \
          JWT_SECRET="dev-jwt-secret-change-in-production" \
          /tmp/cloud-api &
          sleep 5
          curl -sf http://localhost:8080/health
          curl -sf http://localhost:8081/health

      - name: Run full API test suite
        run: chmod +x test/test_api.sh && ./test/test_api.sh

  # ── Deploy to cloud VM (opt-in) ─────────────────────────────────────────────
  # Enable by setting Actions variable ENABLE_DEPLOY=true and secrets:
  #   CLOUD_VM_HOST, CLOUD_VM_SSH_PORT, CLOUD_VM_USER, CLOUD_VM_SSH_KEY
  #
  # What this does on every push to main:
  #   1. Copies all migration files to the VM
  #   2. Runs any new migrations against the live postgres container (idempotent — safe to re-run)
  #   3. Pulls new cloud-api + test-ui images and restarts them
  deploy:
    name: Deploy to cloud VM
    runs-on: ubuntu-latest
    needs: [cloud-api, conf-agent, readers, test, test-ui]
    if: ${{ github.ref == 'refs/heads/main' && vars.ENABLE_DEPLOY == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase repo name
        run: echo "REPO=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      # Copy migration files to VM so the SSH step can apply them
      - name: Copy migrations to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.CLOUD_VM_HOST }}
          port:     ${{ secrets.CLOUD_VM_SSH_PORT }}
          username: ${{ secrets.CLOUD_VM_USER }}
          key:      ${{ secrets.CLOUD_VM_SSH_KEY }}
          source: "cloud/migrations/*.sql,cloud/migrations-telemetry/*.sql"
          target: "/opt/qube-enterprise/"
          strip_components: 0

      - name: Run migrations + restart services
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.CLOUD_VM_HOST }}
          port:     ${{ secrets.CLOUD_VM_SSH_PORT }}
          username: ${{ secrets.CLOUD_VM_USER }}
          key:      ${{ secrets.CLOUD_VM_SSH_KEY }}
          script: |
            set -e
            cd /opt/qube-enterprise

            echo "=== Applying migrations to qubedb ==="
            for f in cloud/migrations/0*.sql; do
              echo "  -> $f"
              docker compose exec -T postgres \
                psql -U qubeadmin -d qubedb < "$f" 2>&1 | grep -v "^NOTICE" | tail -5 || true
            done

            echo "=== Ensuring qubedata DB exists ==="
            docker compose exec -T postgres \
              psql -U qubeadmin -d postgres -c "CREATE DATABASE qubedata;" 2>&1 | grep -v "^NOTICE" || true

            echo "=== Applying migrations to qubedata ==="
            for f in cloud/migrations-telemetry/0*.sql; do
              echo "  -> $f"
              docker compose exec -T postgres \
                psql -U qubeadmin -d qubedata < "$f" 2>&1 | grep -v "^NOTICE" | tail -5 || true
            done

            echo "=== Pulling new images ==="
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull cloud-api test-ui

            echo "=== Restarting services ==="
            docker compose up -d cloud-api test-ui
            sleep 5
            curl -sf http://localhost:8080/health && echo "Deploy OK"
