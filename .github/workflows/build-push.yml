name: Build and Push Qube Enterprise Images

on:
  push:
    branches: [main, develop]
    tags:    ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  # Change to your GitHub username/org:
  # REGISTRY: registry.gitlab.com/iot-team4/product  (for GitLab)

jobs:
  # ── Cloud API (amd64 only — runs on cloud server) ───────────────────────────
  build-cloud-api:
    name: Build cloud-api (amd64)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push cloud-api
        uses: docker/build-push-action@v5
        with:
          context:   ./cloud
          platforms: linux/amd64
          push:      ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/enterprise-cloud-api:amd64.latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/enterprise-cloud-api:amd64.${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── ARM64 images (run on Qube devices) ──────────────────────────────────────
  # Option A: Cross-compile on amd64 runner (fast, no arm hardware needed)
  # Option B: Native arm64 runner (if you have a self-hosted arm64 runner)
  build-arm64-images:
    name: Build arm64 images (cross-compile)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: enterprise-conf-agent
            context: ./conf-agent
          - service: enterprise-influx-to-sql
            context: ./enterprise-influx-to-sql
          - service: mqtt-gateway
            context: ./mqtt-gateway

    steps:
      - uses: actions/checkout@v4

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU (for arm64 cross-compile)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context:   ${{ matrix.context }}
          platforms: linux/arm64
          push:      ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.service }}:arm64.latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.service }}:arm64.${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to:   type=gha,mode=max,scope=${{ matrix.service }}

  # ── Run API tests after images are built ────────────────────────────────────
  test:
    name: API test suite
    runs-on: ubuntu-latest
    needs: [build-cloud-api]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB:       qubedb
          POSTGRES_USER:     qubeadmin
          POSTGRES_PASSWORD: qubepass
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 3s
          --health-retries 20

    steps:
      - uses: actions/checkout@v4

      - name: Run migrations
        run: |
          sudo apt-get install -y postgresql-client
          for f in cloud/migrations/*.sql; do
            PGPASSWORD=qubepass psql -h localhost -U qubeadmin -d qubedb -f "$f"
          done

      - name: Build cloud-api locally for test
        run: |
          cd cloud
          go build -o /tmp/cloud-api ./cmd/server
        env:
          CGO_ENABLED: 0
          GOOS: linux

      - name: Start cloud-api
        run: |
          DATABASE_URL="postgres://qubeadmin:qubepass@localhost:5432/qubedb?sslmode=disable" \
          JWT_SECRET="ci-test-secret" \
          API_PORT=8080 TP_PORT=8081 \
          /tmp/cloud-api &
          sleep 5
          curl -s http://localhost:8080/health

      - name: Run API test suite
        run: |
          chmod +x test/test_api.sh
          ./test/test_api.sh

  # ── Deploy to cloud VM after successful tests ────────────────────────────────
  deploy-cloud:
    name: Deploy to cloud VM
    runs-on: ubuntu-latest
    needs: [build-cloud-api, test]
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy cloud-api to production VM
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.CLOUD_VM_HOST }}
          username: ${{ secrets.CLOUD_VM_USER }}
          key:      ${{ secrets.CLOUD_VM_SSH_KEY }}
          script: |
            cd /opt/qube-enterprise
            docker compose pull cloud-api
            docker compose up -d cloud-api
            sleep 5
            curl -s http://localhost:8080/health
            echo "Deploy complete"
