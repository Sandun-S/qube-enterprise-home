version: "3.8"
# Generated by Qube Enterprise TP-API
# Qube: Q-1001 | Location: Server Room 1
# Deploy: docker stack deploy -c docker-compose.yml qube

networks:
  qube-net:
    external: true

services:

  # ── Enterprise Conf-Agent ──────────────────────────────────────────────────
  enterprise-conf-agent:
    image: ghcr.io/sandun-s/qube-enterprise-home/conf-agent:arm64.latest
    hostname: enterprise-conf-agent
    networks:
      - qube-net
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/qube:/opt/qube
    environment:
      - QUBE_ID=Q-1001
    logging:
      driver: "local"
      options:
        max-size: "10mb"
        max-file: "20"
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  # ── Enterprise Influx-to-SQL ───────────────────────────────────────────────
  enterprise-influx-to-sql:
    image: ghcr.io/sandun-s/qube-enterprise-home/influx-to-sql:arm64.latest
    hostname: enterprise-influx-to-sql
    networks:
      - qube-net
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - /opt/qube/sensor_map.json:/config/sensor_map.json:ro
    environment:
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_DB=qube-db
      - SENSOR_MAP_PATH=/config/sensor_map.json
      - TPAPI_URL=${TPAPI_URL}
      - QUBE_ID=Q-1001
      - QUBE_TOKEN=${QUBE_TOKEN}
    logging:
      driver: "local"
      options:
        max-size: "10mb"
        max-file: "20"
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  # Gateway: Panel_A (modbus_tcp) → 192.168.1.100
  panel-a:
    image: ghcr.io/sandun-s/qube-enterprise-home/modbus-gateway:arm64.latest
    hostname: panel-a
    networks:
      - qube-net
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - /opt/qube/configs/panel-a/configs.yml:/app/configs.yml:ro
      - /opt/qube/configs/panel-a/config.csv:/app/config.csv:ro
    logging:
      driver: "local"
      options:
        max-size: "10mb"
        max-file: "20"
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  # Gateway: PlantOPC (opcua) → opc.tcp://192.168.1.18:52520/OPCUA/Server
  plantopc:
    image: ghcr.io/sandun-s/qube-enterprise-home/opc-ua-gateway:arm64.latest
    hostname: plantopc
    networks:
      - qube-net
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - /opt/qube/configs/plantopc/configs.yml:/app/configs.yml:ro
      - /opt/qube/configs/plantopc/config.csv:/app/config.csv:ro
    logging:
      driver: "local"
      options:
        max-size: "10mb"
        max-file: "20"
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  # Gateway: UPS_Room1 (snmp) → 192.168.1.200
  ups-room1:
    image: ghcr.io/sandun-s/qube-enterprise-home/snmp-gateway:arm64.latest
    hostname: ups-room1
    networks:
      - qube-net
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - /opt/qube/configs/ups-room1/configs.yml:/app/configs.yml:ro
      - /opt/qube/configs/ups-room1/config.csv:/app/config.csv:ro
      - /opt/qube/configs/ups-room1/maps:/app/maps:ro
      - /opt/qube/configs/ups-room1:/app/oids:ro
    logging:
      driver: "local"
      options:
        max-size: "10mb"
        max-file: "20"
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  # Gateway: MQTT_Floor2 (mqtt) → 192.168.1.10
  mqtt-floor2:
    image: ghcr.io/sandun-s/qube-enterprise-home/mqtt-gateway:arm64.latest
    hostname: mqtt-floor2
    networks:
      - qube-net
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - /opt/qube/configs/mqtt-floor2/configs.yml:/app/configs.yml:ro
      - /opt/qube/configs/mqtt-floor2/config.csv:/app/config.csv:ro
    logging:
      driver: "local"
      options:
        max-size: "10mb"
        max-file: "20"
    deploy:
      replicas: 1
      restart_policy:
        condition: any

