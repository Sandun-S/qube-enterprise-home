version: "3.8"
# Generated by Qube Enterprise TP-API
# Qube: Q-1001 | Location: unset
# Deploy: docker stack deploy -c docker-compose.yml qube

networks:
  qube-net:
    external: true

services:

  # ── Enterprise Conf-Agent ──────────────────────────────────────────────────
  enterprise-conf-agent:
    image: ghcr.io/sandun-s/qube-enterprise-home/conf-agent:arm64.latest
    hostname: enterprise-conf-agent
    networks:
      - qube-net
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /opt/qube:/opt/qube
    environment:
      - QUBE_ID=Q-1001
    logging:
      driver: "local"
      options:
        max-size: "10mb"
        max-file: "20"
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  # ── Enterprise Influx-to-SQL ───────────────────────────────────────────────
  enterprise-influx-to-sql:
    image: ghcr.io/sandun-s/qube-enterprise-home/influx-to-sql:arm64.latest
    hostname: enterprise-influx-to-sql
    networks:
      - qube-net
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - /opt/qube/sensor_map.json:/config/sensor_map.json:ro
    environment:
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_DB=qube-db
      - SENSOR_MAP_PATH=/config/sensor_map.json
      - TPAPI_URL=${TPAPI_URL}
      - QUBE_ID=Q-1001
      - QUBE_TOKEN=${QUBE_TOKEN}
    logging:
      driver: "local"
      options:
        max-size: "10mb"
        max-file: "20"
    deploy:
      replicas: 1
      restart_policy:
        condition: any

%!(EXTRA string=Q-1001)  # Gateway: test (modbus_tcp) → 192.168.1.1
  test:
    image: ghcr.io/sandun-s/qube-enterprise-home/modbus-gateway:arm64.latest
    hostname: test
    networks:
      - qube-net
    volumes:
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - /opt/qube/configs/test/configs.yml:/app/configs.yml:ro
      - /opt/qube/configs/test/config.csv:/app/config.csv:ro
    logging:
      driver: "local"
      options:
        max-size: "10mb"
        max-file: "20"
    deploy:
      replicas: 1
      restart_policy:
        condition: any

