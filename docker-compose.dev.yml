# docker-compose.dev.yml — Qube Enterprise v2 Local Dev Stack
# Run: docker compose -f docker-compose.dev.yml up -d --build
#
# v2 changes from v1:
#   - TimescaleDB for telemetry (qubedata database)
#   - SQLite shared volume (qube-data) instead of CSV files
#   - No MQTT broker (removed — no Grafana on Qube)
#   - WebSocket for cloud→qube communication (fallback: HTTP polling)
#   - Reader containers instead of gateway containers
#
# Ports:
#   8080 = Cloud API + WebSocket (/ws)
#   8081 = TP-API (polling fallback)
#   5432 = PostgreSQL (qubedb + qubedata)
#   8086 = InfluxDB v1
#   8585 = Core-Switch (simulated, for reader → coreswitch)
#   8888 = Test UI

version: "3.8"

networks:
  qube_dev:
    driver: bridge

volumes:
  postgres_data:
  influxdb_data:
  qube_data:       # Shared SQLite volume (replaces CSV files)

services:

  # ── PostgreSQL (Management DB + Telemetry DB) ──────────────────
  # Same instance, two databases: qubedb (management) + qubedata (TimescaleDB)
  postgres:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    networks: [qube_dev]
    ports: ["5432:5432"]
    environment:
      POSTGRES_USER: qubeadmin
      POSTGRES_PASSWORD: qubepass
      POSTGRES_DB: qubedb
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Management DB migrations
      - ./cloud/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
      - ./cloud/migrations/002_global_data.sql:/docker-entrypoint-initdb.d/002_global_data.sql:ro
      - ./cloud/migrations/003_test_seeds.sql:/docker-entrypoint-initdb.d/003_test_seeds.sql:ro
      # Telemetry DB setup (creates qubedata database + TimescaleDB hypertable)
      - ./cloud/migrations-telemetry/001_timescale_init.sql:/docker-entrypoint-initdb.d/010_timescale_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qubeadmin -d qubedb"]
      interval: 5s
      retries: 10

  # ── Cloud API + TP-API + WebSocket Server ──────────────────────
  cloud-api:
    build: {context: ./cloud, dockerfile: Dockerfile}
    restart: unless-stopped
    networks: [qube_dev]
    ports: ["8080:8080", "8081:8081"]
    environment:
      DATABASE_URL: postgres://qubeadmin:qubepass@postgres:5432/qubedb?sslmode=disable
      TELEMETRY_DATABASE_URL: postgres://qubeadmin:qubepass@postgres:5432/qubedata?sslmode=disable
      JWT_SECRET: dev-jwt-secret-change-in-production
      QUBE_IMAGE_REGISTRY: "ghcr.io/sandun-s/qube-enterprise-home"
      # GitLab production — change only this line:
      # QUBE_IMAGE_REGISTRY: "registry.gitlab.com/iot-team4/product"
    depends_on:
      postgres: {condition: service_healthy}

  # ── InfluxDB v1 (Edge data buffer — matches real Qube) ────────
  influxdb:
    image: influxdb:1.8
    restart: unless-stopped
    networks: [qube_dev]
    ports: ["8086:8086"]
    volumes: [influxdb_data:/var/lib/influxdb]
    environment:
      INFLUXDB_DB: edgex
      INFLUXDB_ADMIN_ENABLED: "true"
      INFLUXDB_HTTP_AUTH_ENABLED: "false"

  # ── Enterprise Conf-Agent (simulated Qube) ────────────────────
  # In dev: connects to cloud-api via WebSocket, manages SQLite
  conf-agent:
    build: {context: ./conf-agent, dockerfile: Dockerfile}
    restart: unless-stopped
    networks: [qube_dev]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - qube_data:/opt/qube/data               # SQLite shared volume
      - ./test/mit.txt:/boot/mit.txt:ro
    environment:
      CLOUD_WS_URL: ws://cloud-api:8080/ws      # WebSocket primary
      TPAPI_URL: http://cloud-api:8081           # HTTP polling fallback
      SQLITE_PATH: /opt/qube/data/qube.db
      WORK_DIR: /opt/qube
      POLL_INTERVAL: "30"
      # QUBE_ID and QUBE_TOKEN auto-obtained from /boot/mit.txt self-registration
    depends_on: [cloud-api]

  # ── Enterprise Influx-to-SQL ───────────────────────────────────
  # Reads sensor_map from SQLite (not sensor_map.json anymore)
  enterprise-influx-to-sql:
    build: {context: ./enterprise-influx-to-sql, dockerfile: Dockerfile}
    restart: unless-stopped
    networks: [qube_dev]
    volumes:
      - qube_data:/opt/qube/data:ro             # SQLite read-only
    environment:
      SQLITE_PATH: /opt/qube/data/qube.db
      TPAPI_URL: http://cloud-api:8081
      QUBE_ID: Q-1001
      QUBE_TOKEN: ""
      INFLUX_URL: http://influxdb:8086
      INFLUX_DB: edgex
    depends_on: [cloud-api, influxdb]

  # ── Test UI ────────────────────────────────────────────────────
  test-ui:
    image: nginx:alpine
    restart: unless-stopped
    networks: [qube_dev]
    ports: ["8888:80"]
    volumes: [./test-ui:/usr/share/nginx/html:ro]

  # ── Simulators (optional, use: docker compose --profile simulators up) ──
  modbus-sim:
    image: oitc/modbus-server:latest
    networks: [qube_dev]
    ports: ["5020:5020"]
    profiles: [simulators]

  snmp-sim:
    image: tandrup/snmpsim:latest
    networks: [qube_dev]
    ports: ["161:161/udp"]
    profiles: [simulators]

  # ── InfluxDB seeder (run once: docker compose run --rm influx-seeder) ──
  influx-seeder:
    image: influxdb:1.8
    networks: [qube_dev]
    profiles: [seed]
    depends_on: [influxdb]
    entrypoint:
      - sh
      - -c
      - |
        sleep 3
        echo 'Seeding test data into InfluxDB...'
        curl -s -X POST 'http://influxdb:8086/query' --data-urlencode 'q=CREATE DATABASE "edgex"' || true
        curl -s -X POST 'http://influxdb:8086/write?db=edgex&precision=s' --data-binary \
          'Measurements,device=Main_Meter,reading=active_power_w value=1250.5
        Measurements,device=Main_Meter,reading=voltage_v value=231.2
        Measurements,device=Main_Meter,reading=current_a value=5.4
        Measurements,device=Main_Meter,reading=energy_kwh value=12045.3
        Measurements,device=Panel_B_Meter,reading=active_power_w value=875.0
        Measurements,device=Panel_B_Meter,reading=voltage_v value=229.8'
        echo 'Done! Check enterprise-influx-to-sql logs.'

  # ══════════════════════════════════════════════════════════════
  # NOTE: Reader containers are NOT in docker-compose.dev.yml.
  # In production, readers are managed by conf-agent via Docker Swarm.
  # For dev testing, you can add them manually:
  #
  #   modbus-reader-test:
  #     build: {context: ./modbus-reader, dockerfile: Dockerfile}
  #     networks: [qube_dev]
  #     volumes:
  #       - qube_data:/opt/qube/data:ro
  #     environment:
  #       READER_ID: "<uuid from cloud API>"
  #       SQLITE_PATH: /opt/qube/data/qube.db
  #       CORESWITCH_URL: http://core-switch:8585
  #
  # Or test readers standalone by running them locally with Go.
  # ══════════════════════════════════════════════════════════════
